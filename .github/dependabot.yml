# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Check daily so that security updates (which are NOT subject to cooldown) are
  # surfaced immediately — this is what keeps the runtime axis (axios + its
  # form-data / follow-redirects transitive tree) patched fast — while regular
  # version bumps wait out a 7-day cooldown.
  - package-ecosystem: 'npm' # See documentation for possible values
    directory: '/' # Location of package manifests
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7
    # Bundle all non-major (minor + patch) npm updates into a single PR; major
    # updates are excluded from the group and still get their own individual PRs.
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
  # The consumer integration test projects are separate npm roots; keep their
  # lockfiles patched too.
  - package-ecosystem: 'npm'
    directory: '/tests/nodejs-javascript'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
  - package-ecosystem: 'npm'
    directory: '/tests/nodejs-typescript'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
  # `@playwright/test` / `playwright` are NOT ignored: ignoring them would also
  # suppress Dependabot security-update PRs, so a Playwright vulnerability could land
  # unnoticed. We accept the trade-off that these npm packages are coupled to the
  # Playwright CONTAINER tag (mcr.microsoft.com/playwright:vX.Y.Z-noble in
  # .github/workflows/{ci-nodejs,cd-publish-to-npm}.yml), which Dependabot cannot edit.
  # When a Playwright bump PR appears, the reviewer must bump that container tag to the
  # matching version in the same merge (see tests/CLAUDE.md). Until they match, only the
  # `test-browser-cdn` job is affected, and it is `continue-on-error: true` (non-gating),
  # so the drift never blocks CI/CD — it just needs a manual tag sync to go green again.
  - package-ecosystem: 'npm'
    directory: '/tests/browser-cdn'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7
